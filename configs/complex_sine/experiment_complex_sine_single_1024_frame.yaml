# @package _global_
# ComplexSineSynth experiment — complex-surrogate frequency estimation
# Uses ONLY the ComplexSineSynth (no noise bands / other synths).
#
# Run:
#   python -m cli.train -cn complex_sine/experiment_complex_sine_single_1024_frame \
#     data.dataset_path=/path/to/dataset \
#     ++experiment.name=my_experiment \
#     trainer.force_restart=true

experiment:
  name: complex_sine_single_1024_frame
  training_dir: training

audio:
  fs: 44100
  chunk_duration_s: 2.0

data:
  dataset_path:  /mnt/mariadata/datasets/surrogate/single_sound/processed
  # augmentations:
  #   - type: RandomMute
  #     params:
  #       prob: 0.1

model:
  resampling_factor: 1024
  analysis_window: 1024

  encoder_type: waveform
  encoder_hidden_channels: [16, 32, 64]
  encoder_strides: [16, 8, 8]  # Product must equal analysis_window (16*8*4=512)

  control_space:
    # - name: loudness
    #   dim: 1
    #   source: feature
    #   extractor: LibrosaFeatureExtractor
    #   params:
    #     feature_fn_name: rms
    #     smoothing_kernel_size: 65
    #     postprocess: true
    # - name: centroid
    #   dim: 1
    #   source: feature
    #   extractor: LibrosaFeatureExtractor
    #   params:
    #     feature_fn_name: spectral_centroid
    #     smoothing_kernel_size: 65
    #     postprocess: true
    - name: latents
      dim: 512
      source: latent
  synths:
    - type: ComplexSineSynth
      params:
        n_sines: 64
  latent_smoothing_kernel: 1
  decoder_gru_layers: 1
  learning_rate: 1e-3
  plateau_patience: 5000
  capacity: 32
  orth_embed_dim: 128
  use_param_table: true
  freeze_table: true
  pretrained_table_path: /home/btadeusz/code/ddsp_vae/training/synth/complex_sine_single_1024_frame/best-v20.ckpt
  stft_n_fft: 4096
  freq_bin_selection: true
  freq_n_fft: 4096
  distill_weight: 1.0
  decoder_recons_weight: 0.0

losses:
  - type: MSELoss
    weight: 1.0

adversarial:
  enabled: false
  weights:
    gen: 1.0
    fm: 1.0
    disc: 1.0
  schedule:
    g_start_epoch: 100
    d_start_epoch: 150

trainer:
  batch_size: 8
  max_epochs: 100001
  log_every_n_steps: 10
  force_restart: false

prior:
  enabled: false

  model:
    embedding_dim: 32
    quantization_channels: 16
    nhead: 8
    num_layers: 4
    dropout: 0.1
    max_len: 64

  dataset:
    stride_factor: 0.2
    in_memory: true

  training:
    batch_size: 256
    max_epochs: 10000
    num_workers: 4
    lr: 1e-4
    force_restart: false
