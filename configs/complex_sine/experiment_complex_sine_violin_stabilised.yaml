# ComplexSineSynth experiment — complex-surrogate frequency estimation
# Uses ONLY the ComplexSineSynth (no noise bands / other synths).
#
# Run:
#   python -m cli.train -cn experiment_complex_sine \
#     data.dataset_path=/path/to/dataset \
#     ++experiment.name=my_experiment \
#     trainer.force_restart=true

experiment:
  name: complex_sine_violin_stabilised
  training_dir: training

audio:
  fs: 44100
  chunk_duration_s: 2.0

data:
  dataset_path: /mnt/mariadata/datasets/ddsp-vae/instruments/violin/processed
  # augmentations:
  #   - type: RandomMute
  #     params:
  #       prob: 0.1

model:
  resampling_factor: 32

  encoder_type: waveform
  encoder_hidden_channels: [32, 64, 128]
  encoder_strides: [4, 4, 2]  # Product must equal resampling_factor (4*4*2=32)

  control_space:
    # - name: loudness
    #   dim: 1
    #   source: feature
    #   extractor: LibrosaFeatureExtractor
    #   params:
    #     feature_fn_name: rms
    #     smoothing_kernel_size: 65
    #     postprocess: true
    # - name: centroid
    #   dim: 1
    #   source: feature
    #   extractor: LibrosaFeatureExtractor
    #   params:
    #     feature_fn_name: spectral_centroid
    #     smoothing_kernel_size: 65
    #     postprocess: true
    - name: latents
      dim: 512
      source: latent
  synths:
    - type: ComplexSineSynth
      params:
        n_sines: 32
  latent_smoothing_kernel: 1
  decoder_gru_layers: 1
  learning_rate: 1e-4
  plateau_patience: 100000
  capacity: 32
  freq_stability_weight: 100.0
  freq_dev_offset: 20
  freq_dev_slope: 0.01
  phase_continuity_weight: 0.0

losses:
  - type: MSELoss
    weight: 1.0

adversarial:
  enabled: false
  weights:
    gen: 1.0
    fm: 1.0
    disc: 1.0
  schedule:
    g_start_epoch: 100
    d_start_epoch: 150

trainer:
  batch_size: 8
  max_epochs: 10001
  log_every_n_steps: 10
  force_restart: false

prior:
  enabled: false

  model:
    embedding_dim: 32
    quantization_channels: 16
    nhead: 8
    num_layers: 4
    dropout: 0.1
    max_len: 64

  dataset:
    stride_factor: 0.2
    in_memory: true

  training:
    batch_size: 256
    max_epochs: 10000
    num_workers: 4
    lr: 1e-4
    force_restart: false
