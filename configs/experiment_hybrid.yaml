# Hybrid ControlSpace: features + latents

experiment:
  name: ddsp_hybrid
  training_dir: training

audio:
  fs: 22050
  chunk_duration_s: 2.0
  n_channels: 1

data:
  dataset_path: /path/to/dataset
  augmentations:
    - type: RandomMute
      params:
        prob: 0.1

model:
  resampling_factor: 32
  control_space:
    - name: loudness
      dim: 1
      source: feature
      extractor: LibrosaFeatureExtractor
      params:
        feature_fn_name: rms
        smoothing_kernel_size: 65
        postprocess: true
    - name: centroid
      dim: 1
      source: feature
      extractor: LibrosaFeatureExtractor
      params:
        feature_fn_name: spectral_centroid
        smoothing_kernel_size: 65
        postprocess: true
    - name: latents
      dim: 2
      source: latent
  synths:
    - type: BendableNoiseBandSynth
      params:
        n_filters: 512
  latent_smoothing_kernel: 65
  decoder_gru_layers: 2
  decoder_temporal_stride: 1
  learning_rate: 1e-4
  plateau_patience: 100000
  capacity: 32
  beta:
    target: 0.001     # target β for the β-VAE KLD term
    start_epoch: 100   # hold β at 0 until this epoch
    end_epoch: 200     # linearly ramp β to target by this epoch

losses:
  - type: MRSTFT
    weight: 1.0
    params:
      fft_sizes: [2053, 1021, 509, 257, 129, 65, 33]

adversarial:
  enabled: true
  weights:
    gen: 1.0
    disc: 1.0
    fm: 1.0
  schedule:
    g_start_epoch: 100
    d_start_epoch: 150

trainer:
  batch_size: 8
  max_epochs: 5001
  log_every_n_steps: 10
  force_restart: false

prior:
  enabled: false

  # Discrete-token prior over LatentCompressor VQ indices. Disabled by default;
  # when disabled the continuous mu-law Prior above is trained unchanged.
  discrete:
    enabled: false
    # Compressor checkpoint. Leave null to auto-train one (from the `compressor:` block below)
    # into training/compressor/<experiment.name>/best.ckpt and use it. Set a path to reuse one.
    compressor_ckpt: null

  model:
    embedding_dim: 32
    quantization_channels: 32
    nhead: 8
    num_layers: 4
    dim_feedforward: 2048
    dropout: 0.1
    max_len: 64

  dataset:
    stride_factor: 0.2
    in_memory: true

  training:
    batch_size: 256
    max_epochs: 10000
    num_workers: 4
    lr: 1e-4
    force_restart: false
    # Used by the discrete-token prior train/val split (ignored by the continuous prior).
    val_fraction: 0.05
    split_strategy: blocked_random
    split_gap: null
    split_seed: 0

# Latent compressor over DDSP control sequences (VQ tokens for the discrete prior).
# Auto-trained as the first stage of cli/train_prior.py when prior.discrete.enabled=true
# (saved to training/compressor/<experiment.name>/best.ckpt).
compressor:
  hidden_dim: 48
  compressed_dim: 32
  strides: [4, 4, 2]          # product = 32x compression
  stride_factor: 0.5
  num_residual_layers: 0
  kernel_size: 5
  max_channels: 448
  use_skip_connections: false # required for codes-only (AR-prior-compatible) decoding

  vq:
    enabled: true
    num_codebooks: 4
    codebook_size: 512
    beta: 0.25
    loss_weight: 0.2

  batch_size: 32
  max_epochs: 250
  learning_rate: 1e-4
  num_workers: 0
