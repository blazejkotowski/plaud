# Hybrid ControlSpace: features + latents

experiment:
  name: ddsp_hybrid
  training_dir: training

audio:
  fs: 22050
  chunk_duration_s: 2.0

data:
  dataset_path: /path/to/dataset
  augmentations:
    - type: RandomMute
      params:
        prob: 0.1

model:
  resampling_factor: 32
  control_space:
    - name: loudness
      dim: 1
      source: feature
      extractor: LibrosaFeatureExtractor
      params:
        feature_fn_name: rms
        smoothing_kernel_size: 65
        postprocess: true
    - name: pitch
      dim: 1
      source: feature
      extractor: CrepePitchExtractor
      params:
        postprocess: True
    - name: latents
      dim: 2
      source: latent
  synths:
    - type: HarmonicSynth
      params:
        n_harmonics: 100
    - type: FilteredNoiseSynth
      params:
        n_bands: 65
  reverb: true
  reverb_length: 44100
  latent_smoothing_kernel: 1
  decoder_gru_layers: 1
  learning_rate: 1e-4
  plateau_patience: 100000
  capacity: 32

losses:
  - type: MRSTFT
    weight: 1.0
    params:
      fft_sizes: [2053, 1021, 509, 257, 129, 65, 33]

adversarial:
  enabled: true
  weights:
    gen: 1.0
    disc: 1.0
    fm: 1.0
  schedule:
    g_start_epoch: 100
    d_start_epoch: 150

trainer:
  batch_size: 8
  max_epochs: 5001
  log_every_n_steps: 10
  force_restart: false

prior:
  enabled: false

  model:
    embedding_dim: 32
    quantization_channels: 32
    nhead: 8
    num_layers: 4
    dropout: 0.1
    max_len: 64

  dataset:
    stride_factor: 0.2
    in_memory: true

  training:
    batch_size: 256
    max_epochs: 10000
    num_workers: 4
    lr: 1e-4
    force_restart: false
