# Latent-only ControlSpace configuration

experiment:
  name: ddsp_latent_only
  training_dir: training

audio:
  fs: 22050
  chunk_duration_s: 2.0
  n_channels: 1

data:
  dataset_path: /path/to/dataset
  augmentations:
    - type: RandomMute
      params:
        prob: 0.1

model:
  resampling_factor: 32
  control_space:
    - name: latents
      dim: 4
      source: latent
  synths:
    - type: BendableNoiseBandSynth
      params:
        n_filters: 512
  latent_smoothing_kernel: 65
  decoder_gru_layers: 2
  decoder_temporal_stride: 1
  learning_rate: 1e-4
  plateau_patience: 100000
  capacity: 32
  beta:
    target: 0.001     # target β for the β-VAE KLD term
    start_epoch: 100   # hold β at 0 until this epoch
    end_epoch: 200     # linearly ramp β to target by this epoch

losses:
  - type: MRSTFT
    weight: 1.0
    params:
      fft_sizes: [2053, 1021, 509, 257, 129, 65, 33]

adversarial:
  enabled: true
  weights:
    gen: 1.0
    disc: 1.0
    fm: 1.0
  schedule:
    g_start_epoch: 100
    d_start_epoch: 150

trainer:
  batch_size: 8
  max_epochs: 5001
  log_every_n_steps: 10
  force_restart: false

prior:
  enabled: false

  model:
    embedding_dim: 32
    quantization_channels: 32
    nhead: 8
    num_layers: 4
    dropout: 0.1
    max_len: 64

  dataset:
    stride_factor: 0.2
    in_memory: true

  training:
    batch_size: 256
    max_epochs: 10000
    num_workers: 4
    lr: 1e-4
    force_restart: false
